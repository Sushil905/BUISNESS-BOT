services:
  backend:
    build:
      context: ..
      dockerfile: docker/backend.dockerfile
    ports:
      - "8080:8080"
    env_file:
      - ../.env

  frontend:
    build:
      context: ..
      dockerfile: docker/frontend.dockerfile
    ports:
      - "5173:5173"
    environment:
      - VITE_API_BASE_URL=http://localhost:8080
    depends_on:
      - backend
