<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BUISNESS BOT</title>
    <link rel="stylesheet" href="styles.css?v=compact-bottom-1" />
  </head>
  <body>
    <div class="ai-background" aria-hidden="true">
      <div class="ai-brain"></div>
    </div>
    <main class="chatgpt-shell">
      <aside class="gpt-sidebar" aria-label="Workspace navigation">
        <div class="sidebar-brand">
          <span>🚀</span>
          <strong>BUSINESS BOT</strong>
        </div>

        <label class="search-box" aria-label="Search conversations">
          <span aria-hidden="true">🔍</span>
          <input type="search" placeholder="Search" />
        </label>

        <button class="new-chat-button" id="resetChat" type="button">
          <span aria-hidden="true">➕</span>
          <span>New Chat</span>
        </button>

        <div class="sidebar-scroll">
          <nav class="primary-nav sidebar-group" aria-label="Primary">
            <button type="button" data-prompt="Open my Business Bot dashboard summary">
              <span aria-hidden="true">▦</span>
              <span>Dashboard</span>
            </button>
            <button type="button" data-prompt="Show my saved reports and useful outputs">
              <span aria-hidden="true">▤</span>
              <span>Library</span>
            </button>
            <button type="button" data-prompt="Open the learning hub and suggest study resources for business and AI">
              <span aria-hidden="true">◉</span>
              <span>Learning Hub</span>
            </button>
            <button type="button" data-prompt="Show available AI tools for business planning, research, uploads, and analysis">
              <span aria-hidden="true">✦</span>
              <span>AI Tools</span>
            </button>
            <button type="button" data-prompt="Show analytics ideas for my business chatbot">
              <span aria-hidden="true">◌</span>
              <span>Analytics</span>
            </button>
          </nav>

          <section class="sidebar-section sidebar-group" aria-label="Projects">
            <h2>Projects ▼</h2>
            <button type="button" data-prompt="Build a resume checker bot with PDF upload">
              <span aria-hidden="true">•</span>
              <span>ResumeRadar</span>
            </button>
            <button type="button" data-prompt="Create a question upload support feature">
              <span aria-hidden="true">•</span>
              <span>Question Upload</span>
            </button>
            <button type="button" data-prompt="Business plan generator">
              <span aria-hidden="true">•</span>
              <span>Business Plan</span>
            </button>
          </section>

          <section class="recents sidebar-group" aria-label="Recent chats">
            <h2>Recent Chats</h2>
            <button type="button" data-prompt="Startup Ideas">Startup Ideas</button>
            <button type="button" data-prompt="Competitor analysis for my business">Competitor Analysis</button>
            <button type="button" data-prompt="Sales and marketing strategy">Marketing Strategy</button>
            <button type="button" data-prompt="Business Model Canvas">Business Model Canvas</button>
            <button type="button" data-prompt="SWOT analysis generator">SWOT Analysis</button>
          </section>

          <section class="saved-reports" aria-label="Saved reports" hidden>
            <div class="saved-header">
              <h2>Saved</h2>
              <button type="button" id="clearReports">Clear</button>
            </div>
            <div id="reportsList" class="reports-list"></div>
          </section>
        </div>

        <div class="sidebar-account">
          <button id="accountButton" type="button">
            <span aria-hidden="true">👤</span>
            <strong id="accountLabel">User</strong>
          </button>
          <button type="button" data-prompt="Show Business Bot settings: AI model key, response mode, upload limits, saved reports, and theme options.">
            <span aria-hidden="true">⚙️</span>
            <strong>Settings</strong>
          </button>
          <button type="button" data-prompt="Show theme options and explain how to switch Business Bot between dark and light UI modes.">
            <span aria-hidden="true">🌙</span>
            <strong>Theme</strong>
          </button>
        </div>
      </aside>

      <section class="chat-card gpt-main" aria-label="Chat conversation">
        <header class="gpt-topbar">
          <button class="model-pill" type="button">
            <span>BUISNESS BOT Auto</span>
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="m9 18 6-6-6-6" />
            </svg>
          </button>
          <div class="topbar-actions">
            <button class="mini-icon" id="saveReport" type="button" aria-label="Save latest report" title="Save latest report">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M12 3v12" />
                <path d="m7 10 5 5 5-5" />
                <path d="M5 21h14" />
              </svg>
            </button>
            <button class="mini-icon" id="copyLatest" type="button" aria-label="Copy latest answer" title="Copy latest answer">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M8 8h10v12H8z" />
                <path d="M6 16H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1" />
              </svg>
            </button>
          </div>
        </header>

        <div class="messages" id="messages" aria-live="polite"></div>

        <div class="bottom-dock">
          <div class="quick-actions" aria-label="Quick message options">
            <button type="button" data-prompt="What is API?">Tech</button>
            <button type="button" data-prompt="How can I improve my resume?">Career</button>
            <button type="button" data-prompt="How can I get more customers for my shop?">Business</button>
            <button type="button" data-prompt="Explain all available full stack AI chatbot features">Full stack</button>
          </div>

          <div class="suggestions" id="suggestions" aria-label="Suggested replies"></div>

          <form class="composer" id="chatForm">
            <input
              class="sr-only"
              id="fileInput"
              type="file"
              accept=".pdf,.ppt,.pptx,image/*,video/*"
              multiple
            />
            <div class="attachment-tray" id="attachmentTray" aria-label="Selected attachments"></div>
            <div class="composer-row">
              <label class="attach-button icon-only" id="attachButton" for="fileInput" aria-label="Attach files" title="Attach PPT, PDF, images, screenshots, or videos">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M12 5v14" />
                  <path d="M5 12h14" />
                </svg>
              </label>
              <label class="sr-only" for="messageInput">Message</label>
              <input
                id="messageInput"
                name="message"
                autocomplete="off"
                placeholder="Ask anything"
              />
              <div class="composer-tools">
                <button class="tool-chip active" id="uploadTool" type="button">📎 Upload</button>
                <button class="tool-chip" id="voiceTool" type="button">🎤 Voice</button>
                <button class="tool-chip" id="webSearchTool" type="button">🌐 Web Search</button>
                <button class="tool-chip" id="deepResearchTool" type="button">🧠 Deep Research</button>
              </div>
              <button class="send-button icon-only" type="submit" aria-label="Send message">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M12 19V5" />
                  <path d="m5 12 7-7 7 7" />
                </svg>
              </button>
            </div>
          </form>

          <button class="sr-only" id="exportChat" type="button">Export</button>
          <button class="sr-only" type="button" data-mode="explain">Explain</button>
          <button class="sr-only" type="button" data-depth="quick">Quick</button>
        </div>
      </section>
    </main>

    <div class="account-modal" id="accountModal" hidden>
      <div class="account-dialog" role="dialog" aria-modal="true" aria-labelledby="accountTitle">
        <div class="account-dialog-header">
          <div>
            <p class="eyebrow">Business Bot account</p>
            <h2 id="accountTitle">Create your account</h2>
          </div>
          <button class="modal-close" id="closeAccountModal" type="button" aria-label="Close account dialog">x</button>
        </div>

        <form class="account-form" id="accountForm">
          <label>
            <span>Name</span>
            <input id="accountNameInput" name="name" autocomplete="name" placeholder="Your name" required />
          </label>
          <label>
            <span>Email</span>
            <input id="accountEmailInput" name="email" type="email" autocomplete="email" placeholder="you@example.com" required />
          </label>
          <label>
            <span>Password</span>
            <input id="accountPasswordInput" name="password" type="password" autocomplete="new-password" placeholder="Minimum 6 characters" required />
          </label>
          <p class="account-note">
            This demo account is saved only in this browser. Connect backend auth later for real login.
          </p>
          <div class="account-actions">
            <button class="secondary-account" id="logoutAccount" type="button">Logout</button>
            <button class="primary-account" type="submit">Create / Login</button>
          </div>
        </form>
      </div>
    </div>

    <script src="app.js"></script>
  </body>
</html>
